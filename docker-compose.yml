services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-speechtotext}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-speechtotext123}
      - POSTGRES_DB=${POSTGRES_DB:-speechtotext}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-speechtotext}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-3002}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3001}
      - BASE_URL=${BASE_URL:-http://localhost:3001}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-speechtotext}:${POSTGRES_PASSWORD:-speechtotext123}@postgres:5432/${POSTGRES_DB:-speechtotext}
    volumes:
      # Dev mode: mount source for hot reload
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4

  frontend:
    build:
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile.dev}
    ports:
      - "${FRONTEND_PORT:-3001}:${FRONTEND_INTERNAL_PORT:-3000}"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:3002}
      - REACT_APP_ADSENSE_ENABLED=${REACT_APP_ADSENSE_ENABLED:-false}
      - REACT_APP_ADSENSE_CLIENT=${REACT_APP_ADSENSE_CLIENT:-}
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      # Dev mode: mount source for hot reload
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      # Traefik labels for production
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.http.routers.speech-frontend.rule=Host(`speech-to-text.me`)"
      - "traefik.http.routers.speech-frontend.entrypoints=http,https"
      - "traefik.http.routers.speech-frontend.tls=true"
      - "traefik.http.routers.speech-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.speech-frontend.loadbalancer.server.port=80"

volumes:
  postgres-data:
  backend-data:
