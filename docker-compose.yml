version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      - BASE_URL=${BASE_URL:-https://speech-to-text.me}
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-}
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.speech-frontend.rule=Host(`speech-to-text.me`)"
      - "traefik.http.routers.speech-frontend.entrypoints=http,https"
      - "traefik.http.routers.speech-frontend.tls=true"
      - "traefik.http.routers.speech-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.speech-frontend.loadbalancer.server.port=80"

volumes:
  backend-data:
