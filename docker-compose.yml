networks:
  coolify:
    external: true
  internal:
    driver: bridge

services:
  autoheal:
    image: willfarrell/autoheal
    restart: always
    networks:
      - internal
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=10
      - AUTOHEAL_START_PERIOD=30
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  postgres:
    image: postgres:16-alpine
    networks:
      - internal
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-speechtotext}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-speechtotext123}
      - POSTGRES_DB=${POSTGRES_DB:-speechtotext}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-speechtotext}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - internal
    expose:
      - "3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://speech-to-text.me}
      - BASE_URL=${BASE_URL:-https://speech-to-text.me}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-speechtotext}:${POSTGRES_PASSWORD:-speechtotext123}@postgres:5432/${POSTGRES_DB:-speechtotext}
    volumes:
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      pdf-service:
        condition: service_healthy
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 30s

  pdf-service:
    build:
      context: ./pdf-service
      dockerfile: Dockerfile
    networks:
      - internal
    expose:
      - "8000"
    environment:
      - OCR_CLOUD_PROVIDER=${OCR_CLOUD_PROVIDER:-none}
      - OCR_CONFIDENCE_THRESHOLD=${OCR_CONFIDENCE_THRESHOLD:-0.85}
      - OCR_MAX_FILE_SIZE=${OCR_MAX_FILE_SIZE:-52428800}
      - OCR_MAX_PAGES=${OCR_MAX_PAGES:-50}
      - DATABASE_PATH=/app/data/jobs.db
    volumes:
      - pdf-service-data:/app/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile}
    networks:
      - internal
    expose:
      - "80"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - REACT_APP_API_URL=${REACT_APP_API_URL:-}
      - REACT_APP_ADSENSE_ENABLED=${REACT_APP_ADSENSE_ENABLED:-false}
      - REACT_APP_ADSENSE_CLIENT=${REACT_APP_ADSENSE_CLIENT:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles:
      - legacy

  frontend-next:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    networks:
      - internal
      - coolify
    expose:
      - "3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://speech-to-text.me}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-speechtotext}:${POSTGRES_PASSWORD:-speechtotext123}@postgres:5432/${POSTGRES_DB:-speechtotext}
      - BACKEND_URL=http://backend:3000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - APPLE_ID=${APPLE_ID:-}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID:-}
      - APPLE_KEY_ID=${APPLE_KEY_ID:-}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@speech-to-text.me}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_BASIC_MONTHLY_PRICE_ID=${STRIPE_BASIC_MONTHLY_PRICE_ID:-}
      - STRIPE_BASIC_YEARLY_PRICE_ID=${STRIPE_BASIC_YEARLY_PRICE_ID:-}
      - STRIPE_PRO_MONTHLY_PRICE_ID=${STRIPE_PRO_MONTHLY_PRICE_ID:-}
      - STRIPE_PRO_YEARLY_PRICE_ID=${STRIPE_PRO_YEARLY_PRICE_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      # Traefik labels for production
      - "traefik.enable=${TRAEFIK_ENABLE:-true}"
      - "traefik.http.routers.speech-frontend.rule=Host(`speech-to-text.me`)"
      - "traefik.http.routers.speech-frontend.entrypoints=http,https"
      - "traefik.http.routers.speech-frontend.tls=true"
      - "traefik.http.routers.speech-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.speech-frontend.middlewares=speech-retry@docker"
      - "traefik.http.services.speech-frontend.loadbalancer.server.port=3001"
      # Health check - wait for container to be healthy before routing
      - "traefik.http.services.speech-frontend.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.speech-frontend.loadbalancer.healthcheck.interval=5s"
      - "traefik.http.services.speech-frontend.loadbalancer.healthcheck.timeout=3s"
      # Retry middleware - retry on 502/503/504 errors
      - "traefik.http.middlewares.speech-retry.retry.attempts=3"
      - "traefik.http.middlewares.speech-retry.retry.initialinterval=100ms"

volumes:
  postgres-data:
  backend-data:
  pdf-service-data:
