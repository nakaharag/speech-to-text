networks:
  coolify:
    external: true
  internal:
    driver: bridge

services:
  autoheal:
    image: willfarrell/autoheal
    restart: always
    networks:
      - internal
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  postgres:
    image: postgres:16-alpine
    networks:
      - internal
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-speechtotext}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-speechtotext123}
      - POSTGRES_DB=${POSTGRES_DB:-speechtotext}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-speechtotext}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - internal
    expose:
      - "3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://speech-to-text.me}
      - BASE_URL=${BASE_URL:-https://speech-to-text.me}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-speechtotext}:${POSTGRES_PASSWORD:-speechtotext123}@postgres:5432/${POSTGRES_DB:-speechtotext}
    volumes:
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      pdf-service:
        condition: service_healthy
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  pdf-service:
    build:
      context: ./pdf-service
      dockerfile: Dockerfile
    networks:
      - internal
    expose:
      - "8000"
    environment:
      - OCR_CLOUD_PROVIDER=${OCR_CLOUD_PROVIDER:-none}
      - OCR_CONFIDENCE_THRESHOLD=${OCR_CONFIDENCE_THRESHOLD:-0.85}
      - OCR_MAX_FILE_SIZE=${OCR_MAX_FILE_SIZE:-52428800}
      - OCR_MAX_PAGES=${OCR_MAX_PAGES:-50}
      - DATABASE_PATH=/app/data/jobs.db
    volumes:
      - pdf-service-data:/app/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile}
    networks:
      - internal
      - coolify
    expose:
      - "80"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - REACT_APP_API_URL=${REACT_APP_API_URL:-}
      - REACT_APP_ADSENSE_ENABLED=${REACT_APP_ADSENSE_ENABLED:-false}
      - REACT_APP_ADSENSE_CLIENT=${REACT_APP_ADSENSE_CLIENT:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      # Traefik labels for production
      - "traefik.enable=${TRAEFIK_ENABLE:-true}"
      - "traefik.http.routers.speech-frontend.rule=Host(`speech-to-text.me`)"
      - "traefik.http.routers.speech-frontend.entrypoints=http,https"
      - "traefik.http.routers.speech-frontend.tls=true"
      - "traefik.http.routers.speech-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.speech-frontend.loadbalancer.server.port=80"
      # Health check - wait for container to be healthy before routing
      - "traefik.http.services.speech-frontend.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.speech-frontend.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.speech-frontend.loadbalancer.healthcheck.timeout=5s"

volumes:
  postgres-data:
  backend-data:
  pdf-service-data:
